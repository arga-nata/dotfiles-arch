general {
    lock_cmd = pidof hyprlock || hyprlock       # avoid multiple hyprlock instances
    before_sleep_cmd = loginctl lock-session    # lock before suspend
    after_sleep_cmd = hyprctl dispatch dpms on  # to avoid having to press a key to wake up the monitor
}

# Dim screen after 2 minutes
listener {
    timeout = 120                                # 2 mins
    on-timeout = brightnessctl set 10%           # set monitor backlight to 10%
    on-resume =           # reset to 100%
}

# Lock screen after 5 minutes
listener {
    timeout = 300                                # 5 mins
    on-timeout = loginctl lock-session           # lock screen
}

# Turn off screen after 10 minutes
listener {
    timeout = 600                                # 10 mins
    on-timeout = hyprctl dispatch dpms off       # dpms off
    on-resume = hyprctl dispatch dpms on         # dpms on
}

# Suspend after 30 minutes
listener {
    timeout = 1800                               # 30 mins
    on-timeout = systemctl suspend               # suspend pc
}
